<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Different SOA Task - FromSystem</title>

  <!-- jsPsych 8.x -->
  <link href="lib/jspsych.css" rel="stylesheet" type="text/css" />
  <script src="lib/jspsych.js"></script>

  <!-- plugins -->
  <script src="lib/plugin-preload.js"></script>
  <script src="lib/plugin-html-keyboard-response.js"></script>
  <script src="lib/plugin-image-keyboard-response.js"></script>
  <script src="lib/plugin-survey-html-form.js"></script>
  <script src="lib/plugin-fullscreen.js"></script>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: rgb(128, 128, 128);
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC",
                   "Noto Sans CJK SC", Arial, sans-serif;
    }

    body {
      background: rgb(128, 128, 128);
    }

    #jspsych-target {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: rgb(128, 128, 128);
    }

    /* jsPsych 榛樿瀹瑰櫒 */
    .jspsych-display-element {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: rgb(128, 128, 128);
    }

    .jspsych-content-wrapper {
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgb(128, 128, 128);
    }

    .jspsych-content {
      max-width: 100vw;
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      text-align: center;
      background: rgb(128, 128, 128);
    }

    /* 鍥剧墖椤碉細瀹屾暣鏄剧ず锛屼笉瑁佸垏 */
    img {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* 浣?experiment.js 閲岀敓鎴愮殑鍒烘縺鍥?*/
    .stim-item {
      position: absolute;
      object-fit: contain;
      transform: translate(-50%, -50%);
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    /* 琛ㄥ崟椤?*/
    input, select, button {
      font-family: inherit;
    }

    /* 鍏ㄥ睆鎸夐挳鏍峰紡绋嶅井骞插噣涓€鐐?*/
    .jspsych-btn {
      font-size: 18px;
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="jspsych-target"></div>

  <!-- 浣犵殑涓诲疄楠岃剼鏈?-->
 <script src="experiment_fromSystem.js?v=20260606_01"></script>
</body>
</html>
